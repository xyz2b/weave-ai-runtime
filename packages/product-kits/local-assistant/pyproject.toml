[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "weavert-kit-local-assistant"
version = "0.1.0"
description = "Local-assistant product kit for extracted WeaveRT scenario packs."
readme = "README.md"
license = "Apache-2.0"
authors = [{ name = "WeaveRT Maintainers" }]
requires-python = ">=3.11"
dependencies = [
  "weavert>=0.1.0,<0.2.0",
  "weavert-kit-common-browser>=0.1.0,<0.2.0",
  "weavert-kit-common-local-os>=0.1.0,<0.2.0",
  "weavert-kit-common-pim>=0.1.0,<0.2.0",
  "weavert-kit-common-retrieval>=0.1.0,<0.2.0",
]
keywords = ["weavert", "agents", "ai", "product-kit", "scenario-pack"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]

[project.urls]
Homepage = "https://github.com/xyz2b/weave-ai-runtime"
Documentation = "https://github.com/xyz2b/weave-ai-runtime/tree/main/docs"
Repository = "https://github.com/xyz2b/weave-ai-runtime"
Issues = "https://github.com/xyz2b/weave-ai-runtime/issues"

[tool.setuptools.packages.find]
where = ["src"]
