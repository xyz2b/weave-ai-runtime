[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "weavert-kit-common-local-os"
version = "0.1.0"
description = "Shared local-OS bridge kit surfaces for extracted WeaveRT product kits."
requires-python = ">=3.11"
dependencies = ["weavert"]

[tool.setuptools.packages.find]
where = ["src"]
